version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - mem0-network

  mem0-app:
    image: mem0-app:latest
    container_name: mem0-app
    ports:
      - "80:80"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: unless-stopped
    networks:
      - mem0-network

volumes:
  ollama_data:

networks:
  mem0-network:
    driver: bridge 